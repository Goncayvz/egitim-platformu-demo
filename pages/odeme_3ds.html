<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Secure - Ödeme Doğrulama</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      body { font-family: "Lexend", sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen grid place-items-center p-6">
    <main class="w-full max-w-lg bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
      <div class="flex items-center gap-3">
        <div class="size-10 rounded-xl bg-purple-100 text-purple-700 grid place-items-center font-black">3D</div>
        <div>
          <h1 class="text-lg font-black">3D Secure Doğrulama</h1>
          <p class="text-sm text-slate-500">Bankanızın doğrulama ekranına yönlendiriliyorsunuz…</p>
        </div>
      </div>
      <div class="mt-5">
        <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
          <div class="h-full w-1/2 bg-purple-600 animate-pulse"></div>
        </div>
        <p id="threeDS-error" class="hidden mt-4 text-sm text-rose-700 bg-rose-50 border border-rose-200 rounded-xl p-3"></p>
      </div>
    </main>

    <script>
      (function () {
        "use strict";

        const errEl = document.getElementById("threeDS-error");
        const showError = (msg) => {
          if (!errEl) return;
          errEl.textContent = msg || "3D Secure verisi bulunamadı.";
          errEl.classList.remove("hidden");
        };

        const loadPayload = () => {
          try {
            const raw = window.sessionStorage ? sessionStorage.getItem("demo_3ds_payload_v1") : "";
            const parsed = raw ? JSON.parse(raw) : null;
            return parsed && typeof parsed === "object" ? parsed : null;
          } catch (_e) {
            return null;
          }
        };

        const decodeBase64 = (b64) => {
          const clean = String(b64 || "").trim();
          if (!clean) return "";
          // Remove whitespace/newlines
          const normalized = clean.replace(/\s+/g, "");
          try {
            return atob(normalized);
          } catch (_e) {
            return "";
          }
        };

        const payload = loadPayload();
        const b64 = payload && payload.threeDSHtmlContent ? String(payload.threeDSHtmlContent) : "";
        const html = decodeBase64(b64);
        if (!html) {
          showError("3D Secure içerik çözümlenemedi. Lütfen ödeme sayfasına dönüp tekrar deneyin.");
          return;
        }

        // Replace this document with bank/iyzico HTML form content (auto submit)
        try {
          document.open();
          document.write(html);
          document.close();
        } catch (_e) {
          showError("3D Secure ekranı açılamadı. Lütfen tekrar deneyin.");
        }
      })();
    </script>
  </body>
</html>
