<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Kayıt Ol - EğitimDünyası</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: '#9c4fba', 'background-dark': '#181121', 'background-light': '#f7f6f8' },
          fontFamily: { display: ['Lexend', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen">
  <main class="min-h-screen grid place-items-center px-4">
    <section class="w-full max-w-xl bg-white dark:bg-white/5 border border-primary/10 rounded-2xl p-8 shadow-xl">
      <a href="index.html" class="text-primary text-sm font-semibold">Ana sayfaya dön</a>
      <h1 class="text-3xl font-black mt-3">Kayıt Ol</h1>
      <p class="text-slate-500 mt-2 text-sm">Dakikalar içinde hesabını oluştur.</p>
      <form id="register-form" class="grid sm:grid-cols-2 gap-4 mt-6" action="#">
        <input id="reg-firstname" class="rounded-xl border-primary/20 dark:bg-white/5" type="text" placeholder="Ad" required/>
        <input id="reg-lastname" class="rounded-xl border-primary/20 dark:bg-white/5" type="text" placeholder="Soyad" required/>
        <input id="reg-email" class="sm:col-span-2 rounded-xl border-primary/20 dark:bg-white/5" type="email" placeholder="E-posta" required/>
        <input id="reg-password" class="sm:col-span-2 rounded-xl border-primary/20 dark:bg-white/5" type="password" placeholder="Şifre" required/>
        <button class="sm:col-span-2 bg-primary text-white font-bold py-3 rounded-xl" type="submit">Ücretsiz Başla</button>
      </form>
      <p id="register-feedback" class="text-xs mt-3 text-slate-500"></p>
      <p class="text-sm text-slate-500 mt-5">Zaten hesabın var mı? <a href="giris.html" class="text-primary font-semibold">Giriş Yap</a></p>
    </section>
  </main>

  <script>
    (function () {
      const USERS_KEY = "demo_users_v1";
      const AUTH_KEY = "demo_current_user_v1";
      const PROFILE_KEY = "demo_user_profile_v1";

      const form = document.getElementById("register-form");
      const firstNameInput = document.getElementById("reg-firstname");
      const lastNameInput = document.getElementById("reg-lastname");
      const emailInput = document.getElementById("reg-email");
      const passwordInput = document.getElementById("reg-password");
      const feedback = document.getElementById("register-feedback");

      const safeText = (v) => String(v ?? "").trim();
      const normalize = (v) => safeText(v).toLowerCase();
      const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v || "").trim());

      const setFeedback = (message, ok) => {
        if (!feedback) return;
        feedback.textContent = message;
        feedback.className = `text-xs mt-3 ${ok ? "text-green-500" : "text-red-500"}`;
      };

      const loadUsers = () => {
        try {
          const raw = localStorage.getItem(USERS_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (_e) {
          return [];
        }
      };

      const saveUsers = (users) => {
        try {
          localStorage.setItem(USERS_KEY, JSON.stringify(users.slice(0, 500)));
        } catch (_e) { }
      };

      const upsertProfileName = (displayName) => {
        try {
          const raw = localStorage.getItem(PROFILE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          if (!parsed.displayName) {
            parsed.displayName = displayName;
            localStorage.setItem(PROFILE_KEY, JSON.stringify(parsed));
          }
        } catch (_e) { }
      };

      if (!form) return;
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const firstName = safeText(firstNameInput?.value);
        const lastName = safeText(lastNameInput?.value);
        const email = safeText(emailInput?.value);
        const password = String(passwordInput?.value || "");

        if (!firstName || !lastName || !email || !password) {
          setFeedback("Tüm alanlar zorunludur.", false);
          return;
        }
        if (!isValidEmail(email)) {
          setFeedback("Geçerli bir e-posta girin.", false);
          return;
        }
        if (password.length < 4) {
          setFeedback("Şifre en az 4 karakter olmalı.", false);
          return;
        }

        const users = loadUsers();
        const emailKey = normalize(email);
        const exists = users.some((u) => normalize(u?.email) === emailKey);
        if (exists) {
          setFeedback("Bu e-posta ile zaten kayıt var. Giriş yapmayı deneyin.", false);
          return;
        }

        const fullName = `${firstName} ${lastName}`.trim();

        const storeAuth = (authUser) => {
          try {
            localStorage.setItem(AUTH_KEY, JSON.stringify(authUser || {}));
          } catch (_e) { }
        };

        const registerLocalFallback = () => {
          const username = emailKey.split("@")[0] || `user${Date.now()}`;
          const user = {
            id: `u_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            role: "Öğrenci",
            status: "Aktif",
            date: new Date().toISOString().slice(0, 10),
            name: fullName,
            fullName,
            username,
            email: emailKey,
            password,
            phone: "",
            note: ""
          };

          users.unshift(user);
          saveUsers(users);
          storeAuth({ id: user.id, role: user.role, fullName: user.fullName, email: user.email });
          upsertProfileName(user.fullName);
          window.location.href = "userpanel.html";
        };

        const setLoading = (on) => {
          const btn = form.querySelector("button[type='submit']");
          if (!btn) return;
          btn.disabled = !!on;
          btn.classList.toggle("opacity-80", !!on);
          btn.classList.toggle("pointer-events-none", !!on);
          btn.textContent = on ? "Kaydediliyor..." : "Ücretsiz Başla";
        };

        (async () => {
          setLoading(true);
          setFeedback("Kayıt yapılıyor...", true);
          try {
            const resp = await fetch("./api/register.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ firstName, lastName, email: emailKey, password, remember: true })
            });
            const data = await resp.json().catch(() => ({}));
            if (resp.ok && data && data.ok) {
              const u = data.user || {};
              storeAuth({
                id: u.id,
                role: u.role || "student",
                fullName: u.fullName || fullName,
                email: u.email || emailKey,
                username: u.username || ""
              });
              upsertProfileName(u.fullName || fullName);
              setFeedback("Kayıt başarılı, yönlendiriliyorsunuz...", true);
              window.location.href = String(data.redirect || "userpanel.html");
              return;
            }

            const msg = String(data?.message || "");
            if (resp.status === 409) {
              setFeedback(msg || "Bu e-posta ile zaten kayıt var. Giriş yapmayı deneyin.", false);
              setLoading(false);
              return;
            }

            // Dev ortamı / API yoksa fallback
            registerLocalFallback();
          } catch (_e) {
            registerLocalFallback();
          }
        })().finally(() => { });
      });
    })();
  </script>
</body>
</html>
